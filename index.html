<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RadioPX</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-dark: #004d14;
    --green-faint: #001a07;
    --amber: #ffb300;
    --red: #ff3333;
    --bg: #050f05;
    --panel: #0a180a;
    --border: #0f3a0f;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--green); font-family: var(--font-mono); }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 1.5rem 1rem 2rem;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 50% 0%, #002a0a55 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, #0f2a0f22 39px, #0f2a0f22 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #0f2a0f22 39px, #0f2a0f22 40px);
  }

  .scanline {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 100;
  }

  .container { width: 100%; max-width: 460px; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 1.5rem; }
  .logo { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--green); letter-spacing: 0.2em; text-shadow: 0 0 20px var(--green); }
  .logo span { color: var(--amber); }
  .tagline { font-size: 10px; color: #3a7a3a; letter-spacing: 0.3em; margin-top: 4px; text-transform: uppercase; }

  /* FREQ DISPLAY */
  .freq-panel {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }
  .freq-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-dim), transparent);
  }
  .freq-label { font-size: 10px; color: #2a6a2a; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; }
  .freq-value {
    font-family: var(--font-display);
    font-size: 36px; font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 30px var(--green);
    letter-spacing: 0.05em;
  }
  .freq-unit { font-size: 14px; color: #2a7a2a; margin-left: 4px; }
  .freq-row { display: flex; align-items: center; justify-content: space-between; }

  .signal-meter { display: flex; align-items: flex-end; gap: 3px; }
  .signal-meter .bar { width: 5px; border-radius: 1px; background: var(--green-dark); transition: background 0.1s; }
  .signal-meter .bar:nth-child(1) { height: 6px; }
  .signal-meter .bar:nth-child(2) { height: 10px; }
  .signal-meter .bar:nth-child(3) { height: 14px; }
  .signal-meter .bar:nth-child(4) { height: 18px; }
  .signal-meter .bar:nth-child(5) { height: 22px; }
  .signal-meter .bar.lit { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* CONTROLS */
  .controls-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .controls-row input[type="text"] {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    letter-spacing: 0.05em;
  }
  .controls-row input:focus { border-color: var(--green-dim); box-shadow: 0 0 0 2px #00ff4120; }
  .controls-row input::placeholder { color: #2a5a2a; }

  .btn {
    background: var(--panel);
    border: 1px solid #1a5a1a;
    border-radius: 4px;
    color: var(--green-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 9px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #0f2a0f; border-color: var(--green-dim); color: var(--green); }
  .btn:active { transform: scale(0.97); }
  .btn.active { background: #0a2a0a; border-color: var(--green); color: var(--green); box-shadow: 0 0 12px #00ff4130; }

  /* CALLSIGN */
  .nick-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .nick-row label { font-size: 10px; color: #2a6a2a; letter-spacing: 0.15em; white-space: nowrap; text-transform: uppercase; }
  .nick-row input[type="text"] {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--amber);
    font-family: var(--font-display);
    font-size: 13px;
    padding: 7px 12px;
    outline: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .nick-row input:focus { border-color: var(--amber); }

  /* STATUS */
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 12px; margin-bottom: 1rem;
    font-size: 11px;
  }
  .status-left { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #1a4a1a; transition: all 0.2s; }
  .dot.online { background: var(--green-dim); box-shadow: 0 0 8px var(--green-dim); }
  .dot.tx { background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: pulse 0.5s infinite alternate; }
  .dot.rx { background: var(--red); box-shadow: 0 0 8px var(--red); }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
  #status-text { color: #3a8a3a; letter-spacing: 0.1em; text-transform: uppercase; }
  .users-badge { color: #2a6a2a; font-size: 10px; }
  .users-badge span { color: var(--green); }

  /* LOG */
  .log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    min-height: 150px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.7;
    margin-bottom: 1rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-entry { color: #2a6a2a; }
  .log-entry .t { color: #1a4a1a; margin-right: 6px; }
  .log-entry.tx { color: var(--green); }
  .log-entry.rx { color: var(--green-dim); }
  .log-entry.sys { color: #1a5a3a; font-style: italic; }
  .log-entry.err { color: var(--red); }

  /* VOLUME METER */
  .vol-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .vol-label { font-size: 10px; color: #2a5a2a; letter-spacing: 0.1em; text-transform: uppercase; width: 30px; }
  .vol-bar { flex: 1; height: 6px; background: var(--panel); border-radius: 3px; border: 1px solid var(--border); overflow: hidden; }
  .vol-fill { height: 100%; width: 0%; border-radius: 3px; background: linear-gradient(90deg, var(--green-dim), var(--green)); transition: width 0.04s; }

  /* PTT */
  .ptt-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .ptt-btn {
    width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #0f3a0f, #050f05);
    border: 2px solid #1a5a1a;
    color: var(--green-dim);
    font-family: var(--font-display);
    font-size: 18px; font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.12s;
    user-select: none; -webkit-user-select: none;
    position: relative;
  }
  .ptt-btn::after {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .ptt-btn .mic-icon { font-size: 36px; line-height: 1; }
  .ptt-btn.active {
    background: radial-gradient(circle at 40% 35%, #1a5a1a, #0a2a0a);
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 40px #00ff4130, inset 0 0 20px #00ff4110;
    transform: scale(0.97);
  }
  .ptt-btn.active::after { border-color: #00ff4140; box-shadow: 0 0 20px #00ff4120; }
  .ptt-hint { font-size: 10px; color: #1a5a1a; letter-spacing: 0.15em; text-align: center; text-transform: uppercase; }

  /* FOOTER */
  .footer { margin-top: 1.5rem; text-align: center; font-size: 10px; color: #1a4a1a; letter-spacing: 0.1em; }

  /* CONNECTING OVERLAY */
  #overlay {
    position: fixed; inset: 0; background: #050f05ee;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 200;
  }
  #overlay.hidden { display: none; }
  .overlay-logo { font-family: var(--font-display); font-size: 24px; color: var(--green); text-shadow: 0 0 20px var(--green); letter-spacing: 0.2em; }
  .overlay-msg { font-size: 12px; color: #3a8a3a; letter-spacing: 0.2em; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="scanline"></div>

<div id="overlay">
  <div class="overlay-logo">RADIO<span style="color:var(--amber)">PX</span></div>
  <div class="overlay-msg">CARREGANDO SDK...</div>
</div>

<div class="container">
  <div class="header">
    <div class="logo">RADIO<span>PX</span></div>
    <div class="tagline">Comunicação por frequência · Internet</div>
  </div>

  <div class="nick-row">
    <label>Callsign:</label>
    <input type="text" id="nick" placeholder="SEU CALLSIGN" maxlength="10" value="PY2ABC" />
  </div>

  <div class="freq-panel">
    <div class="freq-label">Frequência Sintonizada</div>
    <div class="freq-row">
      <div>
        <span class="freq-value" id="freq-display">146.520</span>
        <span class="freq-unit">MHz</span>
      </div>
      <div class="signal-meter" id="signal-meter">
        <div class="bar lit"></div>
        <div class="bar lit"></div>
        <div class="bar lit"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </div>

  <div class="controls-row">
    <input type="text" id="freq-input" placeholder="Ex: 146.520" value="146.520" />
    <button class="btn" id="btn-tune">▶ SINTONIZAR</button>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">DESCONECTADO</span>
    </div>
    <div class="users-badge">Na freq: <span id="user-count">0</span></div>
  </div>

  <div class="log-box" id="log-box">
    <div class="log-entry sys"><span class="t">[--:--]</span> RadioPX iniciado. Aguardando SDK...</div>
  </div>

  <div class="vol-row">
    <span class="vol-label">VOL</span>
    <div class="vol-bar"><div class="vol-fill" id="vol-fill"></div></div>
  </div>

  <div class="ptt-wrap">
    <button class="ptt-btn" id="ptt-btn" disabled>
      <span class="mic-icon">🎙</span>
      <span>PTT</span>
    </button>
    <div class="ptt-hint">Segure para transmitir · Barra de espaço</div>
  </div>

  <div class="footer">RadioPX v1.0 · Powered by Agora.io · 10.000 min/mês grátis</div>
</div>

<script src="agora.js"></script>
<script>
const APP_ID = 'dfa95e2535d94ab386c6dd6d7f2116fb';

let client = null;
let localTrack = null;
let currentChannel = '146520';
let currentFreq = '146.520';
let isTransmitting = false;
let isMuted = true;
let remoteUsers = {};
let volInterval = null;
let analyser = null;
let audioCtx = null;

function ts() {
  return new Date().toTimeString().slice(0,5);
}
function log(msg, type='sys') {
  const box = document.getElementById('log-box');
  const el = document.createElement('div');
  el.className = 'log-entry ' + type;
  el.innerHTML = `<span class="t">[${ts()}]</span> ${msg}`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  if (box.children.length > 80) box.removeChild(box.children[0]);
}
function setStatus(text, mode) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'dot ' + (mode || '');
}
function freqToChannel(freq) {
  return 'rpx_' + freq.replace(/\./g, '_');
}
function getBeep() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep(type) {
  const ctx = getBeep();
  if (type === 'tx_start') {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 1200; g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o.start(); o.stop(ctx.currentTime + 0.12);
  } else if (type === 'tx_end') {
    [0, 0.1].forEach((t, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = [1800, 900][i];
      g.gain.setValueAtTime(0.25, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.09);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.09);
    });
  } else if (type === 'rx') {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(700, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1300, ctx.currentTime + 0.07);
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    o.start(); o.stop(ctx.currentTime + 0.18);
  } else if (type === 'tune') {
    [0, 0.09, 0.18].forEach((t, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = [500, 700, 1000][i];
      g.gain.setValueAtTime(0.15, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.08);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.08);
    });
  }
}

function updateSignal(level) {
  const bars = document.querySelectorAll('#signal-meter .bar');
  bars.forEach((b, i) => b.classList.toggle('lit', i < level));
}
function startVolMeter() {
  if (!localTrack) return;
  volInterval = setInterval(() => {
    if (localTrack && isTransmitting) {
      const vol = localTrack.getVolumeLevel ? localTrack.getVolumeLevel() * 100 : 0;
      document.getElementById('vol-fill').style.width = Math.min(100, vol * 3) + '%';
    }
  }, 50);
}
function stopVolMeter() {
  clearInterval(volInterval);
  document.getElementById('vol-fill').style.width = '0%';
}

async function joinChannel(freq) {
  const ch = freqToChannel(freq);
  const nick = document.getElementById('nick').value.trim().toUpperCase() || 'ANON';

  if (client) {
    try { await client.leave(); } catch(e) {}
    client = null;
    if (localTrack) { localTrack.close(); localTrack = null; }
  }

  client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });

  client.on('user-published', async (user, mediaType) => {
    await client.subscribe(user, mediaType);
    if (mediaType === 'audio') {
      remoteUsers[user.uid] = user;
      user.audioTrack.play();
      playBeep('rx');
      log(`↙ Estação entrando na frequência`, 'rx');
      updateSignal(4);
      setTimeout(() => updateSignal(3), 1000);
      document.getElementById('user-count').textContent = Object.keys(remoteUsers).length + 1;
    }
  });

  client.on('user-unpublished', (user) => {
    delete remoteUsers[user.uid];
    log(`↗ Estação saiu da frequência`, 'sys');
    document.getElementById('user-count').textContent = Object.keys(remoteUsers).length + 1;
  });

  client.on('user-left', (user) => {
    delete remoteUsers[user.uid];
    document.getElementById('user-count').textContent = Object.keys(remoteUsers).length + 1;
  });

  setStatus('CONECTANDO...', '');
  log(`Conectando em ${freq} MHz...`, 'sys');

  try {
    const uid = await client.join(APP_ID, ch, null, null);
    localTrack = await AgoraRTC.createMicrophoneAudioTrack();
    await localTrack.setMuted(true);

    currentFreq = freq;
    currentChannel = ch;
    document.getElementById('freq-display').textContent = freq;
    document.getElementById('ptt-btn').disabled = false;
    document.getElementById('user-count').textContent = '1';
    setStatus('NA FREQUÊNCIA', 'online');
    updateSignal(3);
    playBeep('tune');
    log(`✓ Conectado em ${freq} MHz como ${nick}`, 'tx');
  } catch(e) {
    log('Erro ao conectar: ' + e.message, 'err');
    setStatus('ERRO', '');
  }
}

async function startPTT() {
  if (!client || !localTrack || isTransmitting) return;
  isTransmitting = true;
  const nick = document.getElementById('nick').value.trim().toUpperCase() || 'ANON';

  try {
    await localTrack.setMuted(false);
    await client.publish(localTrack);
    playBeep('tx_start');
    setStatus('TRANSMITINDO...', 'tx');
    document.getElementById('ptt-btn').classList.add('active');
    log(`▶ ${nick} transmitindo em ${currentFreq} MHz`, 'tx');
    updateSignal(5);
    startVolMeter();
  } catch(e) {
    isTransmitting = false;
    log('Erro ao transmitir: ' + e.message, 'err');
  }
}

async function stopPTT() {
  if (!isTransmitting) return;
  isTransmitting = false;
  const nick = document.getElementById('nick').value.trim().toUpperCase() || 'ANON';

  try {
    await client.unpublish(localTrack);
    await localTrack.setMuted(true);
    playBeep('tx_end');
    setStatus('NA FREQUÊNCIA', 'online');
    document.getElementById('ptt-btn').classList.remove('active');
    log(`◼ ${nick} fim de transmissão`, 'tx');
    updateSignal(3);
    stopVolMeter();
  } catch(e) {
    log('Erro: ' + e.message, 'err');
  }
}

// Tune button
document.getElementById('btn-tune').addEventListener('click', async () => {
  const val = document.getElementById('freq-input').value.trim();
  if (!val) return;
  const num = parseFloat(val);
  if (isNaN(num) || num < 1 || num > 9999) { log('Frequência inválida!', 'err'); return; }
  const freq = num.toFixed(3);
  await joinChannel(freq);
});

// PTT button
const pttBtn = document.getElementById('ptt-btn');
pttBtn.addEventListener('mousedown', startPTT);
pttBtn.addEventListener('mouseup', stopPTT);
pttBtn.addEventListener('mouseleave', () => { if (isTransmitting) stopPTT(); });
pttBtn.addEventListener('touchstart', e => { e.preventDefault(); startPTT(); }, { passive: false });
pttBtn.addEventListener('touchend', e => { e.preventDefault(); stopPTT(); }, { passive: false });

// Spacebar PTT
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); startPTT(); } });
document.addEventListener('keyup', e => { if (e.code === 'Space') { e.preventDefault(); stopPTT(); } });

// Init
window.addEventListener('load', async () => {
  const overlay = document.getElementById('overlay');
  overlay.querySelector('.overlay-msg').textContent = 'CARREGANDO SDK...';

  // Wait for AgoraRTC to be ready
  let tries = 0;
  const waitSDK = setInterval(async () => {
    tries++;
    if (typeof AgoraRTC !== 'undefined') {
      clearInterval(waitSDK);
      overlay.querySelector('.overlay-msg').textContent = 'SDK PRONTO';
      setTimeout(() => {
        overlay.classList.add('hidden');
        log('SDK Agora.io carregado com sucesso.', 'sys');
        log('Digite uma frequência e clique SINTONIZAR para conectar.', 'sys');
      }, 600);
    } else if (tries > 30) {
      clearInterval(waitSDK);
      overlay.querySelector('.overlay-msg').textContent = 'ERRO AO CARREGAR SDK';
      overlay.querySelector('.overlay-msg').style.color = 'var(--red)';
    }
  }, 200);
});
</script>
</body>
</html>
